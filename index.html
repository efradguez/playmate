<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PlayMate web prototype for child digital safety supervision.">
  <title>PlayMate | Digital Family Safety</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <svg aria-hidden="true" class="icon-sprite">
    <symbol id="icon-dashboard" viewBox="0 0 24 24">
      <path d="M4 13h7V4H4v9Zm0 7h7v-5H4v5Zm9 0h7v-9h-7v9Zm0-16v5h7V4h-7Z"/>
    </symbol>
    <symbol id="icon-child" viewBox="0 0 24 24">
      <path d="M12 12.5a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm-7 8a7 7 0 0 1 14 0H5Zm15.5-11a2.5 2.5 0 1 1-3.6-2.2 5.8 5.8 0 0 1 3.6 2.2Z"/>
    </symbol>
    <symbol id="icon-risk" viewBox="0 0 24 24">
      <path d="M12 3 2.8 20h18.4L12 3Zm0 5.2 1 6.5h-2l1-6.5Zm0 10.3a1.3 1.3 0 1 1 0-2.6 1.3 1.3 0 0 1 0 2.6Z"/>
    </symbol>
    <symbol id="icon-alert" viewBox="0 0 24 24">
      <path d="M18 10a6 6 0 1 0-12 0c0 5-2 6-2 6h16s-2-1-2-6Zm-8 9a2 2 0 0 0 4 0h-4Z"/>
    </symbol>
    <symbol id="icon-block" viewBox="0 0 24 24">
      <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm0 3a7 7 0 0 1 5 11.9L7.1 7A7 7 0 0 1 12 5Zm0 14a7 7 0 0 1-5-11.9L16.9 17A7 7 0 0 1 12 19Z"/>
    </symbol>
    <symbol id="icon-history" viewBox="0 0 24 24">
      <path d="M12 4a8 8 0 1 1-7.4 5H2l3.7-4.2L9.4 9H6.8A6 6 0 1 0 12 6v5l4 2-1 1.8-5-2.8V4h2Z"/>
    </symbol>
    <symbol id="icon-report" viewBox="0 0 24 24">
      <path d="M5 3h14v18H5V3Zm4 13h2V9H9v7Zm4 0h2V6h-2v10Zm-8 0h2v-4H5v4Zm0 3h14v-1H5v1Z"/>
    </symbol>
    <symbol id="icon-ai" viewBox="0 0 24 24">
      <path d="M12 2a7 7 0 0 0-7 7v2.2A5 5 0 0 0 7.8 20h8.4A5 5 0 0 0 19 11.2V9a7 7 0 0 0-7-7Zm-3 9.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm6 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3Zm-6.2 3.2h6.4a3.5 3.5 0 0 1-6.4 0Z"/>
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24">
      <path d="M19.4 13.5c.1-.5.1-1 .1-1.5s0-1-.1-1.5l2-1.5-2-3.4-2.4 1a8 8 0 0 0-2.6-1.5L14 2.5h-4l-.4 2.6A8 8 0 0 0 7 6.6l-2.4-1-2 3.4 2 1.5c-.1.5-.1 1-.1 1.5s0 1 .1 1.5l-2 1.5 2 3.4 2.4-1a8 8 0 0 0 2.6 1.5l.4 2.6h4l.4-2.6a8 8 0 0 0 2.6-1.5l2.4 1 2-3.4-2-1.5ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/>
    </symbol>
    <symbol id="icon-profile" viewBox="0 0 24 24">
      <path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm-9 9a9 9 0 0 1 18 0H3Z"/>
    </symbol>
    <symbol id="icon-menu" viewBox="0 0 24 24">
      <path d="M4 6h16v2H4V6Zm0 5h16v2H4v-2Zm0 5h16v2H4v-2Z"/>
    </symbol>
    <symbol id="icon-search" viewBox="0 0 24 24">
      <path d="M10.5 4a6.5 6.5 0 0 1 5.1 10.5l4 4-1.4 1.4-4-4A6.5 6.5 0 1 1 10.5 4Zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Z"/>
    </symbol>
    <symbol id="icon-chevron" viewBox="0 0 24 24">
      <path d="m9 18 6-6-6-6v12Z"/>
    </symbol>
    <symbol id="icon-close" viewBox="0 0 24 24">
      <path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5Zm12.6 1.4L6.4 19 5 17.6 17.6 5 19 6.4Z"/>
    </symbol>
  </svg>

  <div class="app" id="app">
    <aside class="sidebar" id="sidebar" aria-label="Primary navigation">
      <div class="brand">
        <img src="assets/playmate-logo.svg" alt="PlayMate logo" class="brand-logo">
        <div class="brand-copy">
          <span class="brand-name">PlayMate</span>
          <span class="brand-subtitle">Family safety</span>
        </div>
        <button class="icon-button sidebar-collapse" id="sidebarCollapse" type="button" aria-label="Collapse sidebar" title="Collapse sidebar">
          <svg class="icon"><use href="#icon-chevron"></use></svg>
        </button>
      </div>

      <nav class="nav-list">
        <button class="nav-link active" type="button" data-route="dashboard">
          <svg class="icon"><use href="#icon-dashboard"></use></svg><span>Dashboard</span>
        </button>
        <button class="nav-link" type="button" data-route="children">
          <svg class="icon"><use href="#icon-child"></use></svg><span>Child Monitoring</span>
        </button>
        <button class="nav-link" type="button" data-route="risk">
          <svg class="icon"><use href="#icon-risk"></use></svg><span>Risk Analysis</span>
        </button>
        <button class="nav-link" type="button" data-route="alerts">
          <svg class="icon"><use href="#icon-alert"></use></svg><span>Alerts</span>
        </button>
        <button class="nav-link" type="button" data-route="blocked">
          <svg class="icon"><use href="#icon-block"></use></svg><span>Blocked Sites</span>
        </button>
        <button class="nav-link" type="button" data-route="history">
          <svg class="icon"><use href="#icon-history"></use></svg><span>Activity History</span>
        </button>
        <button class="nav-link" type="button" data-route="reports">
          <svg class="icon"><use href="#icon-report"></use></svg><span>Reports</span>
        </button>
        <button class="nav-link" type="button" data-route="mentor">
          <svg class="icon"><use href="#icon-ai"></use></svg><span>AI Mentor</span>
        </button>
        <button class="nav-link" type="button" data-route="settings">
          <svg class="icon"><use href="#icon-settings"></use></svg><span>Settings</span>
        </button>
        <button class="nav-link" type="button" data-route="profile">
          <svg class="icon"><use href="#icon-profile"></use></svg><span>Profile</span>
        </button>
      </nav>

      <div class="sidebar-card">
        <span class="mini-label">Protection score</span>
        <strong id="sidebarScore">92%</strong>
        <div class="mini-progress" aria-hidden="true"><span style="width: 92%"></span></div>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay" hidden></div>

    <div class="workspace">
      <header class="topbar">
        <button class="icon-button mobile-menu" id="mobileMenu" type="button" aria-label="Open navigation" title="Open navigation">
          <svg class="icon"><use href="#icon-menu"></use></svg>
        </button>

        <div class="topbar-title">
          <span class="page-kicker">Parent console</span>
          <h1 id="pageTitle">Dashboard</h1>
        </div>

        <form class="global-search" id="globalSearch" role="search">
          <label class="sr-only" for="searchInput">Search PlayMate</label>
          <svg class="icon search-icon"><use href="#icon-search"></use></svg>
          <input id="searchInput" type="search" autocomplete="off" placeholder="Search children, alerts, sites">
          <button class="text-button search-submit" type="submit">Search</button>
          <div class="search-results" id="searchResults" hidden></div>
        </form>

        <div class="topbar-actions">
          <label class="monitor-pill" title="Monitoring status">
            <input id="monitoringSwitch" type="checkbox" checked>
            <span class="switch-ui" aria-hidden="true"></span>
            <span id="monitoringLabel">Monitoring ON</span>
          </label>

          <div class="notification-menu">
            <button class="icon-button has-badge" id="notificationButton" type="button" aria-label="Open notifications" title="Notifications">
              <svg class="icon"><use href="#icon-alert"></use></svg>
              <span class="badge-dot" id="notificationBadge">3</span>
            </button>
            <div class="dropdown-panel" id="notificationPanel" hidden></div>
          </div>

          <button class="parent-chip" id="profileShortcut" type="button" title="Open profile">
            <span class="avatar" id="parentAvatar">AR</span>
            <span>
              <strong id="parentNameHeader">Alex Rivera</strong>
              <small>Parent</small>
            </span>
          </button>
        </div>
      </header>

      <main class="content" id="content" tabindex="-1"></main>
    </div>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>
  <div class="modal-root" id="modalRoot" hidden></div>
</body>
</html>
